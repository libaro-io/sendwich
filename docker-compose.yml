services:
  php:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      network: host
    user: dev
    volumes:
      - .:/var/www:delegated
      - ./.docker/php/files/override.ini:/usr/local/etc/php/conf.d/local.ini:delegated
    ports:
        - "${DOCKER_PHP_PORT:-80}:80"
    depends_on:
        - mysql
    networks:
        - internal

  mysql:
    image: mysql:8.4
    command: --mysql-native-password=ON
    environment:
        MYSQL_ROOT_PASSWORD: dev
        MYSQL_DATABASE: dev
        MYSQL_USER: dev
        MYSQL_PASSWORD: dev
    ports:
        - "${DOCKER_MYSQL_PORT:-3306}:3306"
    networks:
        - internal

networks:
  internal:
